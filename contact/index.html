<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Junuxa</title>
<style>
:root{ 
  --bg:#f8fafc; 
  --bg2:#ffffff; 
  --accent:#3b82f6; 
  --accent-glow:#3b82f620; 
  --glass:rgba(59,130,246,0.06); 
  --glass-border:rgba(59,130,246,0.15); 
  --text:#1e293b; 
  --text-dim:#64748b; 
}

@font-face { 
  font-family: 'GoogleSans'; 
  src: url('https://junaedsomrat.github.io/Junuxa/data/fonts/google-sans.ttf') format('truetype'); 
  font-display: swap; 
}

*{margin:0;padding:0;box-sizing:border-box}

body{ 
  font-family: "GoogleSans", sans-serif; 
  background:var(--bg); 
  color:var(--text); 
  min-height:100vh; 
  overflow-x:hidden; 
  position:relative; 
  display:flex; 
  flex-direction:column; 
}

/* Animated blue glow background */
body::before, body::after{ 
  content:''; 
  position:fixed; 
  width:600px; 
  height:600px; 
  border-radius:50%; 
  background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%); 
  filter:blur(100px); 
  z-index:0; 
  animation:float 20s ease-in-out infinite; 
}

body::before{ 
  top:-200px; 
  left:-200px; 
}

body::after{ 
  bottom:-200px; 
  right:-200px; 
  animation-delay:-10s; 
}

@keyframes float{ 
 0%,100%{transform:translate(0,0) scale(1)} 
 50%{transform:translate(100px,100px) scale(1.1)} 
}

.container{ 
  max-width:1200px; 
  margin:0 auto; 
  padding:0 20px; 
  position:relative; 
  z-index:1; 
  width:100%; 
}

/* Navbar */
nav{ 
  display:flex; 
  justify-content:space-between; 
  align-items:center; 
  padding:20px 0; 
  animation:fadeDown 0.8s ease; 
  position:relative; 
  z-index:1000; 
}

.logo{ 
  font-size:26px; 
  font-weight:800; 
  background:linear-gradient(90deg,#3b82f6,#1d4ed8); 
  -webkit-background-clip:text; 
  -webkit-text-fill-color:transparent; 
  background-clip:text; 
}

.nav-links{ 
  display:flex; 
  gap:40px; 
  list-style:none; 
}

.nav-links a{ 
  color:var(--text-dim); 
  text-decoration:none; 
  font-size:15px; 
  transition:all 0.3s; 
  position:relative; 
}

.nav-links a::after{ 
  content:''; 
  position:absolute; 
  bottom:-4px; 
  left:0; 
  width:0; 
  height:2px; 
  background:var(--accent); 
  transition:width 0.3s; 
}

.nav-links a:hover{ 
  color:var(--text); 
}

.nav-links a:hover::after{ 
  width:100%; 
}

.nav-links a.active{ 
  color:var(--text); 
}

.nav-links a.active::after{ 
  width:100%; 
}

/* Contact Form */
.wrap{ 
  width: 90%; 
  max-width:700px; 
  margin:80px auto; 
  background:var(--bg2); 
  backdrop-filter:blur(20px) saturate(180%); 
  -webkit-backdrop-filter:blur(20px) saturate(180%); 
  border:1px solid var(--glass-border); 
  border-radius:24px; 
  padding:60px; 
  box-shadow:0 10px 40px rgba(0,0,0,0.08), 0 0 30px var(--accent-glow); 
  animation:blurFadeUp 1s 0.2s both cubic-bezier(0.22, 1, 0.36, 1); 
  flex:1; 
  position:relative; 
  overflow:hidden; 
  z-index:0;
}

.wrap::before{ 
  content:''; 
  position:absolute; 
  top:-50%; 
  left:-50%; 
  width:200%; 
  height:200%; 
  background:radial-gradient(circle, var(--accent-glow) 0%, transparent 50%); 
  opacity:0.3; 
  animation:rotate 15s linear infinite; 
  z-index:0; 
}

@keyframes rotate{ 
  from{transform:rotate(0deg);} 
  to{transform:rotate(360deg);} 
}

.form-content{ 
  position:relative; 
  z-index:1; 
}

.badge{ 
  display:inline-block; 
  padding:8px 16px; 
  background:rgba(59,130,246,0.08); 
  border:1px solid var(--glass-border); 
  border-radius:50px; 
  font-size:14px; 
  color:var(--accent); 
  margin-bottom:24px; 
  backdrop-filter:blur(10px); 
}

h1{ 
  font-size:48px; 
  font-weight:800; 
  line-height:1.1; 
  margin-bottom:16px; 
  background:linear-gradient(180deg,#1e293b 0%,#475569 100%); 
  -webkit-background-clip:text; 
  -webkit-text-fill-color:transparent; 
  background-clip:text; 
}

.subtitle{ 
  font-size:16px; 
  color:var(--text-dim); 
  line-height:1.6; 
  margin-bottom:40px; 
}

.form-group{ 
  margin-bottom:24px; 
  position:relative; 
}

label{ 
  display:block; 
  font-size:13px; 
  font-weight:600; 
  color:var(--accent); 
  margin-bottom:8px; 
  text-transform:uppercase; 
  letter-spacing:0.5px; 
}

input, textarea{ 
  width:100%; 
  padding:16px 20px; 
  background:#f8fafc; 
  border:1px solid var(--glass-border); 
  border-radius:14px; 
  font-size:15px; 
  color:var(--text); 
  outline:none; 
  transition:all 0.3s cubic-bezier(0.22, 1, 0.36, 1); 
  font-family:"GoogleSans"; 
}

input::placeholder, textarea::placeholder{ 
  color:var(--text-dim); 
}

input:focus, textarea:focus{ 
  border-color:var(--accent); 
  box-shadow:0 0 0 4px var(--accent-glow); 
  background:#ffffff; 
  transform:translateY(-2px); 
}

textarea{ 
  resize:vertical; 
  min-height:140px; 
}

.btn-submit{ 
  width:100%; 
  padding:18px; 
  border:none; 
  border-radius:14px; 
  background:linear-gradient(135deg,#3b82f6,#2563eb); 
  color:#fff; 
  font-size:16px; 
  font-weight:600; 
  cursor:pointer; 
  transition:all 0.3s cubic-bezier(0.22, 1, 0.36, 1); 
  box-shadow:0 8px 30px var(--accent-glow); 
  font-family:"GoogleSans"; 
  position:relative; 
  overflow:hidden; 
}

.btn-submit::before{ 
  content:''; 
  position:absolute; 
  top:0; 
  left:-100%; 
  width:100%; 
  height:100%; 
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent); 
  transition:all 0.5s; 
}

.btn-submit:hover{ 
  transform:translateY(-3px); 
  box-shadow:0 12px 40px var(--accent-glow); 
}

.btn-submit:hover::before{ 
  left:100%; 
}

.btn-submit:active{ 
  transform:translateY(0); 
}

/* Footer */
footer{ 
  text-align:center; 
  margin-top:60px; 
  padding:40px 20px; 
  border-top:1px solid var(--glass-border); 
  color:var(--text-dim); 
  font-size:14px; 
  animation:fadeUp 1s ease 0.6s both; 
  position:relative; 
  z-index:1; 
}

@keyframes blurFadeUp{ 
  from{opacity:0;filter:blur(16px);transform:translateY(30px);} 
  to{opacity:1;filter:blur(0);transform:translateY(0);} 
}

@keyframes fadeUp{ 
  from{opacity:0;transform:translateY(40px)} 
  to{opacity:1;transform:translateY(0)} 
}

@keyframes fadeDown{ 
  from{opacity:0;transform:translateY(-20px)} 
  to{opacity:1;transform:translateY(0)} 
}

/* Hamburger */
.menu-toggle{ 
  display:none; 
  flex-direction:column; 
  gap:5px; 
  cursor:pointer; 
  z-index:1002; 
}

.menu-toggle span{ 
  width:25px; 
  height:2px; 
  background:var(--text); 
  transition:0.3s; 
}

.menu-toggle.active span:nth-child(1){ 
  transform:rotate(45deg) translate(7px,7px); 
}

.menu-toggle.active span:nth-child(2){ 
  opacity:0; 
}

.menu-toggle.active span:nth-child(3){ 
  transform:rotate(-45deg) translate(7px,-7px); 
}

/* Mobile Menu */
@media(max-width:720px){ 
  .menu-toggle{ 
    display:flex; 
  } 
  
  h1{font-size:36px;} 
  
  .wrap{
    margin:40px 16px;
    padding:40px 24px;
    z-index:0;
  }
  
  .nav-links{ 
    display:flex; 
    position:absolute; 
    top:calc(100% + 10px); 
    left:0; 
    width:100%; 
    flex-direction:column; 
    gap:0; 
    background:var(--bg2); 
    border:1px solid var(--glass-border); 
    border-radius:12px; 
    overflow:hidden; 
    transform-origin:top right; 
    transform:scale(0.85); 
    opacity:0; 
    filter:blur(8px); 
    pointer-events:none; 
    transition:transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease, filter 0.35s ease; 
    z-index:1001; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  } 
  
  .nav-links.active{ 
    transform:scale(1); 
    opacity:1; 
    filter:blur(0px); 
    pointer-events:all; 
  } 
  
  .nav-links li{ 
    width:100%; 
  } 
  
  .nav-links a{ 
    display:block; 
    padding:16px 20px; 
    border-bottom:1px solid var(--glass-border); 
    position:relative; 
    overflow:hidden; 
    transition:all 0.2s ease; 
  } 
  
  .nav-links a::after{display:none;} 
  
  .nav-links a:active{ 
    background:var(--accent-glow); 
    transform:scale(0.98); 
    box-shadow:inset 0 0 20px var(--accent-glow); 
  } 
}
</style>
</head>
<body>
<div class="container">
<nav>
<div class="logo"><img src="https://junaedsomrat.github.io/Junuxa/Images/nav.png" alt="Junuxa" style="height: 35px;"></div>
 <ul class="nav-links" id="navLinks">
  <li><a href="https://junaedsomrat.github.io/Junuxa/">Home</a></li>
  <li><a href="https://junaedsomrat.github.io/Junuxa/recent-news">Recent News</a></li>
  <li><a href="https://junaedsomrat.github.io/Junuxa/about">About us</a></li>
    <li><a href="https://junaedsomrat.github.io/Junuxa/contact" class="active"><b>Contact</b></a></li>
      <li><a href="https://junaedsomrat.github.io/Junuxa/features">Features</a></li>
 </ul>
 <div class="menu-toggle" id="menuToggle">
  <span></span>
  <span></span>
  <span></span>
 </div>
</nav>
</div>

<div class="wrap">
 <div class="form-content">
  <div class="badge">Get In Touch</div>
  <h1>Let's Connect</h1>
  <p class="subtitle">Have a project in mind or want to collaborate? Drop us a message and we'll get back to you within 24 hours.</p>
  
  <form action="https://formsubmit.co/rohosshopata@gmail.com" method="POST">
   <!-- Formsubmit config -->
   <input type="hidden" name="_subject" value="New Message from Junuxa Website">
   <input type="hidden" name="_captcha" value="false">
   <input type="hidden" name="_template" value="table">
   
   <div class="form-group">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" placeholder="Abdullah" required>
   </div>
   
   <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="abdullah@gmail.com" required>
   </div>
   
   <div class="form-group">
    <label for="address">Address</label>
    <input type="text" id="address" name="address" placeholder="Dhaka, Bangladesh">
   </div>
   
   <div class="form-group">
    <label for="message">Your Message</label>
    <textarea id="message" name="message" placeholder="Tell us about your thoughts..." required></textarea>
   </div>
   
   <button type="submit" class="btn-submit">Send Message</button>
  </form>
 </div>
</div>

<footer>
 <p>© <span id="year"></span> Junuxa Production. All rights reserved.</p>
</footer>

<script>
document.getElementById("year").textContent=new Date().getFullYear();

const toggle=document.getElementById("menuToggle");
const navLinks=document.getElementById("navLinks");
toggle.addEventListener("click",()=>{toggle.classList.toggle("active");navLinks.classList.toggle("active");});
</script>
</body>
</html>
