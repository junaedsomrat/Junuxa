<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Maker - Junuxa</title>
<link rel="stylesheet" href="https://junaedsomrat.github.io/Junuxa/assets/css/recent-news-maker-099173783223.css">
</head>
<body>
<div class="wrap">
 <h1>News JSON Maker</h1>
 <p class="subtitle">Fill the form and generate JSON for recent-news.json</p>
 
 <div class="form-group">
  <label>Title</label>
  <input type="text" id="title" placeholder="News title here">
 </div>
 
 <div class="form-group">
  <label>Thumbnail URL</label>
  <input type="url" id="thumbnail" placeholder="https://example.com/image.jpg">
 </div>
 
 <div class="form-group">
  <label>Date</label>
  <input type="text" id="date" placeholder="October 5, 2025">
 </div>
 
 <div class="form-group">
  <label>Author</label>
  <input type="text" id="author" placeholder="John Doe">
 </div>
 
 <div class="form-group">
  <label>Content</label>
  <textarea id="content" placeholder="Write the full news content here..."></textarea>
 </div>
 
 <div class="btn-group">
  <button onclick="addNews()">Add to List</button>
  <button onclick="generateJSON()">Generate JSON</button>
  <button onclick="clearList()">Clear All</button>
 </div>
 
 <div class="output" id="output">
  <label>Copy this JSON to /data/json/recent-news.json</label>
  <textarea id="jsonOutput" readonly></textarea>
  <button onclick="copyJSON()">Copy to Clipboard</button>
 </div>
 
 <div class="note">
  <strong>How it works:</strong><br>
 1. Fill the form and click "Add to List" for each news item<br>
 2. Click "Generate JSON" when done<br>
 3. Copy the output and save it as <code>/data/json/recent-news.json</code><br>
 
 </div>
</div>
<script src="https://junaedsomrat.github.io/Junuxa/assets/js/recent-news-maker-838010019838.js"></script>
</body>
</html>
